    <!--felt like jumbotron makes the site good looking-->
    <header class="jumbotron jumbotron-fluid text-center bg-white ">

            <h1 class="display-4 animate__animated animate__fadeInDown">Hello, I'm <span

            <div class="flip-container animate__animated animate__fadeIn animate__delay-2s">
